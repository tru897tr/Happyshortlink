<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happyshortlink — Bảng tin</title>
<meta name="description" content="Đọc tin tức mới nhất, dữ liệu được xử lý theo thời gian thực.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  .hero {
    padding: 56px 0 40px;
    text-align: left;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-mono);
    font-size: 0.76rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(94,234,212,0.6);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(94,234,212,0.55); }
    70% { box-shadow: 0 0 0 7px rgba(94,234,212,0); }
    100% { box-shadow: 0 0 0 0 rgba(94,234,212,0); }
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.1rem);
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
    max-width: 720px;
  }
  .hero p.lead {
    color: var(--text-muted);
    font-size: 1.05rem;
    max-width: 560px;
    margin: 0;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 32px;
    align-items: start;
    padding-bottom: 60px;
  }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .post-feed { display: flex; flex-direction: column; gap: 14px; }

  .post-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: border-color 0.18s, transform 0.18s;
  }
  .post-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .post-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-family: var(--font-mono);
  }
  .post-card h2 {
    font-family: var(--font-display);
    font-size: 1.25rem;
    margin: 0 0 8px;
    line-height: 1.3;
  }
  .post-card p {
    color: var(--text-muted);
    font-size: 0.92rem;
    margin: 0;
  }
  .post-tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .tag-chip {
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--accent-dim);
    color: var(--accent);
    font-family: var(--font-mono);
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }

  .sidebar { position: sticky; top: 90px; display: flex; flex-direction: column; gap: 18px; }

  .stat-strip {
    display: flex;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .stat-strip > div {
    flex: 1;
    padding: 0 14px;
    text-align: center;
  }
  .stat-strip > div:first-child { padding-left: 0; }
  .stat-strip > div:last-child { padding-right: 0; }
  .stat-strip > div + div { border-left: 1px solid var(--border); }
  .stat-strip b { color: var(--text); font-size: 1.05rem; display: block; font-family: var(--font-display); margin-bottom: 2px; }

  .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 24px; }
</style>
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a href="/" class="logo">
      <span class="logo-mark" aria-hidden="true"></span>
      Happyshortlink
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link is-active"><span class="full">Bảng tin</span> 📰</a>
    </div>
  </nav>
</header>

<main class="container">

  <section class="hero">
    <div class="hero-eyebrow"><span class="pulse-dot"></span> Cập nhật theo thời gian thực</div>
    <h1>Theo dõi tin tức mới nhất.</h1>
    <p class="lead">Bảng tin tổng hợp những bài viết mới nhất, sắp xếp theo thời gian đăng tải.</p>
  </section>

  <div class="layout">
    <section>
      <div class="section-label">Bài viết mới nhất</div>
      <div id="postFeed" class="post-feed">
        <div class="skeleton" style="height:120px;"></div>
        <div class="skeleton" style="height:120px;"></div>
        <div class="skeleton" style="height:120px;"></div>
      </div>
      <div class="pagination" id="pagination" style="display:none;">
        <button class="btn btn-ghost btn-sm" id="prevBtn">← Mới hơn</button>
        <button class="btn btn-ghost btn-sm" id="nextBtn">Cũ hơn →</button>
      </div>
    </section>

    <aside class="sidebar">
      <div class="card">
        <div class="stat-strip" id="statStrip">
          <div><b id="statPosts">—</b>bài viết</div>
          <div><b id="statLinks">—</b>liên kết</div>
          <div><b id="statClicks">—</b>lượt nhấp</div>
        </div>
      </div>
    </aside>
  </div>

</main>

<footer class="site-footer">
  Happyshortlink — hệ thống rút gọn liên kết &amp; bảng tin.
  <span class="footer-credit">Dev by Tru897tr (Nguyễn Trứ)</span>
</footer>

<div class="toast" id="toast"></div>

<script src="/app.js"></script>
<script>
(function () {
  const postFeed = document.getElementById('postFeed');
  const pagination = document.getElementById('pagination');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const LIMIT = 6;
  let offset = 0;
  let total = 0;

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'vừa xong';
    if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
    if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
    return Math.floor(diff / 86400) + ' ngày trước';
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadPosts() {
    postFeed.innerHTML = '<div class="skeleton" style="height:120px;"></div><div class="skeleton" style="height:120px;"></div>';
    try {
      const res = await fetch(`/public/posts?limit=${LIMIT}&offset=${offset}`);
      const json = await res.json();
      if (!json.success) throw new Error(json.error?.message);

      total = json.data.total;
      const items = json.data.items;

      if (items.length === 0) {
        postFeed.innerHTML = `<div class="empty-state">Chưa có bài viết nào.</div>`;
      } else {
        postFeed.innerHTML = items.map(p => `
          <a class="post-card" href="${p.url}">
            <div class="post-meta">
              <span>${escapeHtml(p.author)}</span>
              <span>·</span>
              <span>${timeAgo(p.createdAt)}</span>
              <span>·</span>
              <span>${p.views} lượt xem</span>
            </div>
            <h2>${escapeHtml(p.title)}</h2>
            <p>${escapeHtml(p.excerpt)}</p>
            ${p.tags && p.tags.length ? `<div class="post-tags">${p.tags.map(t => `<span class="tag-chip">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          </a>
        `).join('');
      }

      pagination.style.display = total > LIMIT ? 'flex' : 'none';
      prevBtn.disabled = offset === 0;
      nextBtn.disabled = offset + LIMIT >= total;
    } catch (err) {
      postFeed.innerHTML = `<div class="empty-state">Không tải được bài viết. Vui lòng thử lại.</div>`;
    }
  }

  prevBtn?.addEventListener('click', () => { offset = Math.max(0, offset - LIMIT); loadPosts(); });
  nextBtn?.addEventListener('click', () => { offset += LIMIT; loadPosts(); });

  async function loadStats() {
    try {
      const res = await fetch('/public/stats');
      const json = await res.json();
      if (json.success) {
        document.getElementById('statLinks').textContent = json.data.totalLinks;
        document.getElementById('statPosts').textContent = json.data.totalPosts;
        document.getElementById('statClicks').textContent = json.data.totalClicks;
      }
    } catch (e) { /* im lặng — không quan trọng với UX chính */ }
  }

  loadPosts();
  loadStats();
})();
</script>

</body>
</html>
