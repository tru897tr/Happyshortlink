<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Không tìm thấy trang — Happyshortlink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  .nf-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .nf-code {
    font-family: var(--font-display);
    font-size: clamp(4rem, 16vw, 7rem);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .nf-title { font-family: var(--font-display); font-size: 1.4rem; margin: 0 0 10px; }
  .nf-sub { color: var(--text-muted); margin: 0 0 26px; }
</style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf-code">404</div>
    <p class="nf-title">Không tìm thấy trang</p>
    <p class="nf-sub">Trang bạn tìm không tồn tại.</p>
    <a href="/" class="btn btn-primary">Về trang chủ</a>
  </div>
</body>
